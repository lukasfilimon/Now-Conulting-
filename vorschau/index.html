<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <!-- Favicon — NOW Logo -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="robots" content="noindex" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap"
    />

    <title>Vorschau — NOW Consulting Masthead</title>

    <style>
      :root {
        --color-black: #0e0c0a;
        --color-surface: #181410;
        --color-surface-2: #211d18;
        --color-gold: #c9a84c;
        --color-gold-light: #e2c97a;
        --color-gold-dark: #a07830;
        --color-border: rgba(201, 168, 76, 0.28);
        --color-text: #f2efe9;
        --color-text-muted: #9e9a94;
        --color-text-dim: #6a6560;
        --font-display: 'Cormorant Garamond', Georgia, serif;
        --font-body: 'Inter', system-ui, sans-serif;
        --font-numeric: 'Inter', sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;

        /* Motion tokens — sitewide Animations-Konstanten */
        --ease-reveal: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-snap: cubic-bezier(0.4, 0, 0.2, 1);
        --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
        --dur-fast: 320ms;
        --dur-base: 600ms;
        --dur-slow: 1000ms;
        --stagger-tight: 140ms;
        --stagger-loose: 200ms;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { width: 100%; }
      body {
        width: 100%;
        min-height: 100vh;
        background: var(--color-black);
        color: var(--color-text);
        font-family: var(--font-body);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: clip;
        position: relative;
      }
      /* Statischer Gold-Glow als dunkler Marken-Hintergrund (kein WebGL) —
         repräsentiert die Hero-Atmosphäre für die Masthead-Beurteilung. */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(60% 50% at 50% 8%, rgba(201, 168, 76, 0.12), transparent 70%),
          radial-gradient(90% 60% at 50% 100%, rgba(201, 168, 76, 0.05), transparent 75%);
      }

      /* Hero-Container über dem Glow */
      #hero-root {
        position: relative;
        z-index: 1;
        width: 100%;
      }

      /* dezenter Vorschau-Marker */
      .vorschau-badge {
        position: fixed;
        bottom: 14px;
        right: 16px;
        z-index: 100;
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.55);
        border: 1px solid rgba(201, 168, 76, 0.22);
        border-radius: 4px;
        padding: 6px 10px;
        background: rgba(14, 12, 10, 0.55);
        backdrop-filter: blur(6px);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Navigation + Hero werden via /vorschau/main.ts gemountet (echte Komponenten) -->
    <div id="hero-root"></div>

    <span class="vorschau-badge">Vorschau · Masthead</span>

    <script type="module" src="/vorschau/main.ts"></script>
  </body>
</html>
