    />

    <title>NOW Consulting — Bewusstsein. Unternehmertum. Ein Weg.</title>

    <style>
      :root {
        /* NOW Brand Colors — synced with masterclass.now-consulting */
        --color-black: #0e0c0a;           /* warm black, not pure */
        --color-surface: #181410;         /* brown-tinted dark surface */
        --color-surface-2: #211d18;       /* elevated surface */
        --color-gold: #c9a84c;            /* primary gold, warm */
        --color-gold-light: #e2c97a;      /* highlight gold */
        --color-gold-dark: #a07830;       /* deep gold for gradients */
        --color-border: rgba(201, 168, 76, 0.28);
        --color-text: #f2efe9;            /* warm off-white */
        --color-text-muted: #9e9a94;
        --color-text-dim: #6a6560;
        --color-matrix-green: #00ff41;    /* matrix accent, intro only */
        --color-white: #ffffff;           /* pure white, used sparingly */

        /* Typography */
        --font-display: 'Cormorant Garamond', Georgia, serif;
        --font-body: 'Inter', system-ui, sans-serif;
        --font-numeric: 'Montserrat', 'Inter', sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;

        /* Motion tokens — sitewide Animations-Konstanten */
        --ease-reveal: cubic-bezier(0.16, 1, 0.3, 1);  /* Premium ease-out-expo: Section-Reveals */
        --ease-snap: cubic-bezier(0.4, 0, 0.2, 1);     /* Schaerfere Kurve: Hover/Click-Feedback */
        --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1); /* Symmetrische ease-in-out: Loops */
        --dur-fast: 320ms;        /* Hover, kleine Feedback-Snaps */
        --dur-base: 600ms;        /* Card-Hover, mittlere Reveals */
        --dur-slow: 1000ms;       /* Section-Reveal, grosse Bewegungen */
        --stagger-tight: 140ms;   /* Geschwister-Cards dicht */
        --stagger-loose: 200ms;   /* Geschwister mit Atem */
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        width: 100%;
      }
      body {
        width: 100%;
        background: var(--color-black);
        color: var(--color-text);
        font-family: var(--font-body);
        font-weight: 400;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: clip;
      }

      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }

      /* ═══════════════════════════════════════════════════════════
         SCROLL-FIX: Vimeo & generic iframes durchlässig während Scroll
         ═══════════════════════════════════════════════════════════
         Ohne diesen Patch frisst jeder iframe das wheel/touch-Event
         sobald der Cursor drüber ist → Lenis stockt, Scroll fühlt sich
         "verklemmt" an. Die Class wird in ScrollManager gesetzt/entfernt.
         Beim Stillstand sind iframes wieder klickbar (Play, Fullscreen). */
      body.is-scrolling iframe {
        pointer-events: none !important;
      }

      /* Compositor-Hint für scroll-relevante Sections mit vielen Karten —
         eigene Layer entlasten den Main-Thread. */
      section[data-section="experiences"],
      section[data-section="stimmen"] {
        contain: layout style;
      }

      /* Adaptive Quality — wenn die PerformanceMonitor 3× hintereinander <30 fps
         misst, wird body.low-fps gesetzt. Wir deaktivieren dann dekorative
         Animationen, ohne den Hero-WebGL (Marken-Identität) zu berühren. */
      body.low-fps .audience-grid-bg::before,
      body.low-fps .manifest-portrait-img,
      body.low-fps .manifest-portrait-glow,
      body.low-fps .hero-headline-em,
      body.low-fps .hero-brand-rest,
      body.low-fps .hero-brand-now,
      body.low-fps .final-cta-btn::before {
        animation: none !important;
      }
      body.low-fps .approach-card-img,
      body.low-fps .program-card,
      body.low-fps .experience-card {
        will-change: auto;
      }

      #app {
        position: relative;
        width: 100%;
      }

      #webgl-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }


      #content {
        position: relative;
        z-index: 2;
      }

      /* Loading state */
      #boot {
        position: fixed;
        inset: 0;
        background: var(--color-black);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 600ms ease-out;
      }

      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #boot .glyph {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--color-gold);
        letter-spacing: 0.32em;
      }

      /* Dev-only FPS overlay */
      #perf {
        position: fixed;
        top: 12px;
        right: 12px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--color-gold);
        background: rgba(0, 0, 0, 0.6);
        padding: 6px 10px;
        border-radius: 3px;
        z-index: 10000;
        pointer-events: none;
        display: none;
      }

      body.dev #perf {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Meta Pixel (noscript fallback) -->
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=2041971686668161&ev=PageView&noscript=1"
    /></noscript>

    <div id="boot"><span class="glyph">Bewusstsein erschafft Realität</span></div>

    <div id="app">
      <canvas id="webgl-canvas"></canvas>
      <main id="content"></main>
    </div>

    <div id="perf"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
